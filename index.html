<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoFaceUI * AssistantAI</title>

        <!--  Lien vers le CSS  -->
  <link rel="stylesheet" href="style.css">

        <!--  SDK MapKit (si nécessaire)  -->
    <script src="https://cdn.apple-mapkit.com/mk/5.x.x/mapkit.js"></script>
    
        <!--  Inclusion de la bibliothèque Leaflet pour la carte -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    
        <!--  Inclusion de la police d'icônes Material Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
</head>

<body>
  <main class="phone">

    <!-- Barre de statut -->
    <section class="status-bar">
      <div class="time-weather">
        <div class="time" id="time">--:--</div>
        <div class="weather">26°C</div>
      </div>
    </section>

    <!-- Infos vol + carte -->
    <section id="springboard" class="springboard">
        <button onclick="toggleSection('springboard')">Afficher/Masquer la carte</button>

      <header id="flight-info" class="flight-info">
        <h1>Vol San Francisco → New York</h1>
        <p>🕒 21h25 - 4h30</p>
        <p>Terminal A, Porte A15</p>
      </header>
    </section>

    <section>
        <header></header>
    </section>

    <!-- Zone assistant -->
    <section class="assistant-footer">
      <p>Comment puis-je vous aider ?</p>
    </section>

    

    <!-- Icônes principales -->
    <nav class="icons" aria-label="Menu assistant">
      <button class="icon" aria-label="Téléphone">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
          <path d="M6.62 10.79a15.053..."/>
        </svg>
      </button>

      <button class="icon" aria-label="Messages">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
          <path d="M20 2H4..."/>
        </svg>
      </button>

      <button class="icon" aria-label="Profil">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
          <path d="M12 2a10..."/>
        </svg>
      </button>

      <button class="icon" aria-label="Assistant IA">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
          <path d="M12 16.5c2.69..."/>
        </svg>
      </button>
    </nav>

  </main>

  <!-- JavaScript -->
  <script src="js/script.js"></script>
  <script src="js/time.js"></script>
  <script src="js/toggle.js"></script>
</body>
</html>
