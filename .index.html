<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NÉRON</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@300;400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,300;0,9..40,400;1,9..40,200;1,9..40,300&display=swap" rel="stylesheet">
<style>

/* ═══════════════════════════════════════════
TOKENS
═══════════════════════════════════════════ */
:root {
–f-d: ‘Syne’, sans-serif;
–f-b: ‘DM Sans’, sans-serif;
–ease:   cubic-bezier(0.4, 0, 0.2, 1);
–spring: cubic-bezier(0.34, 1.56, 0.64, 1);
–c-p:    #8b6fd4;
–c-pl:   #a78bfa;
–c-bl:   #60a5fa;
–c-gold: #fbbf24;
–c-dim:  rgba(238,237,245,0.32);
–c-bdr:  rgba(255,255,255,0.07);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: #ddd8d0; }
body { display: flex; align-items: center; justify-content: center; font-family: var(–f-b); }

/* ── Phone shell ── */
.phone {
width: 390px;
height: 844px;
max-width: 100vw;
max-height: 100dvh;
position: relative;
overflow: hidden;
border-radius: 52px;
box-shadow:
0 0 0 1px rgba(255,255,255,0.6),
0 0 0 2px rgba(180,180,180,0.2),
0 50px 100px rgba(0,0,0,0.25),
inset 0 1px 0 rgba(255,255,255,0.95),
inset 0 -1px 0 rgba(0,0,0,0.05);
}

@media (max-width: 420px) {
.phone { border-radius: 0; height: 100dvh; width: 100vw; }
}

/* ── Generic screen ── */
.screen {
position: absolute;
inset: 0;
display: flex;
flex-direction: column;
}

/* ═══════════════════════════════════════════
ORB MORPH OVERLAY
— a full-screen circle that expands from
the orb position, covering the home screen
═══════════════════════════════════════════ */
#morph-overlay {
position: absolute;
/* start: centered on the home orb (bottom-left area) */
left: 50px;
bottom: 70px;
width: 44px;
height: 44px;
border-radius: 50%;
background: conic-gradient(from 0deg, #8b6fd4, #60a5fa, #a78bfa, #8b6fd4);
z-index: 100;
transform: scale(0);
transform-origin: center;
pointer-events: none;
will-change: transform;
}

#morph-overlay.expanding {
animation: morph-expand .72s cubic-bezier(0.76, 0, 0.24, 1) forwards;
}

#morph-overlay.collapsing {
animation: morph-collapse .52s cubic-bezier(0.76, 0, 0.24, 1) forwards;
}

/* We need the circle to cover ~870px diagonal from bottom-left → scale ≈ 30 */
@keyframes morph-expand {
0%   { transform: scale(0);  filter: brightness(1.2); }
60%  { filter: brightness(1.4); }
100% { transform: scale(32); filter: brightness(1); }
}

@keyframes morph-collapse {
0%   { transform: scale(32); opacity: 1; }
100% { transform: scale(0);  opacity: 0; }
}

/* ═══════════════════════════════════════════
LOADING OVERLAY (brief spinner after morph)
═══════════════════════════════════════════ */
#loader {
position: absolute;
inset: 0;
z-index: 99;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
background: #08070f;
opacity: 0;
pointer-events: none;
transition: opacity .25s;
gap: 20px;
}

#loader.visible { opacity: 1; pointer-events: all; }

.loader-orb {
width: 56px; height: 56px;
border-radius: 50%;
position: relative;
}

.loader-orb::before {
content: ‘’;
position: absolute;
inset: 0;
border-radius: 50%;
padding: 2.5px;
background: conic-gradient(from 0deg, #8b6fd4, #60a5fa, #a78bfa, #8b6fd4);
-webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
-webkit-mask-composite: xor;
mask-composite: exclude;
animation: loader-spin 1s linear infinite;
}

.loader-orb::after {
content: ‘’;
position: absolute;
inset: 6px;
border-radius: 50%;
background: radial-gradient(circle at 38% 32%, rgba(167,139,250,.18), rgba(8,7,15,.95) 65%);
}

@keyframes loader-spin { to { transform: rotate(360deg); } }

.loader-text {
font-family: var(–f-d);
font-size: .68rem;
font-weight: 400;
letter-spacing: .3em;
text-transform: uppercase;
color: rgba(238,237,245,.3);
animation: loader-pulse 1.5s ease-in-out infinite;
}

@keyframes loader-pulse { 0%,100%{opacity:.3} 50%{opacity:.8} }

/* ═══════════════════════════════════════════
HOME SCREEN
═══════════════════════════════════════════ */
#home {
cursor: pointer;
-webkit-tap-highlight-color: transparent;
/* visible/hidden managed by JS class */
opacity: 1;
transition: opacity .3s var(–ease);
}

#home.fading { opacity: 0; pointer-events: none; }

/* Gradient */
.home-gradient {
position: absolute;
inset: 0;
background:
radial-gradient(ellipse 90%  70% at 50%   0%, rgba(255,255,255,1)    0%, transparent 58%),
radial-gradient(ellipse 60%  55% at 94%  18%, rgba(255,195,210,0.78) 0%, transparent 55%),
radial-gradient(ellipse 55%  50% at 65%  58%, rgba(245,238,195,0.72) 0%, transparent 55%),
radial-gradient(ellipse 70%  60% at 18%  78%, rgba(205,240,198,0.68) 0%, transparent 55%),
radial-gradient(ellipse 48%  42% at 8%   28%, rgba(215,205,255,0.45) 0%, transparent 50%),
radial-gradient(ellipse 100% 100% at 50% 50%, #f5f0e8, #eee8df);
animation: grad-breathe 11s ease-in-out infinite alternate;
}

@keyframes grad-breathe {
0%   { filter: hue-rotate(0deg)  saturate(1)    brightness(1);    }
50%  { filter: hue-rotate(5deg)  saturate(1.06) brightness(1.01); }
100% { filter: hue-rotate(-4deg) saturate(0.94) brightness(1.02); }
}

/* Blobs */
.blob { position: absolute; border-radius: 50%; filter: blur(44px); pointer-events: none; mix-blend-mode: multiply; }
.b1 { width:230px; height:170px; background:rgba(255,188,210,0.48); top:4%;  right:-5%; animation: bd 9s ease-in-out infinite alternate; }
.b2 { width:270px; height:210px; background:rgba(195,242,188,0.42); bottom:6%; left:-7%; animation: bd 12s ease-in-out infinite alternate-reverse; }
.b3 { width:190px; height:190px; background:rgba(246,230,155,0.48); bottom:26%; right:4%; animation: bd 8s ease-in-out infinite alternate; animation-delay:-3s; }
.b4 { width:160px; height:130px; background:rgba(198,188,255,0.32); top:28%; left:-3%; animation: bd 14s ease-in-out infinite alternate-reverse; }

@keyframes bd {
0%   { transform: translate(0,0)      scale(1);    }
50%  { transform: translate(14px,-9px) scale(1.05); }
100% { transform: translate(-7px,11px) scale(0.96); }
}

/* Grain */
.home-grain {
position: absolute; inset: 0; opacity: .02;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 600 600’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘n’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=’.65’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23n)’/%3E%3C/svg%3E”);
background-size: 200px; pointer-events: none;
}

/* Pink blush accent */
.blush {
position: absolute; right: 44px; top: 175px;
width: 96px; height: 72px;
background: radial-gradient(ellipse, rgba(255,175,200,0.58), transparent 70%);
filter: blur(18px); pointer-events: none;
animation: blush-pulse 5s ease-in-out infinite alternate;
}
@keyframes blush-pulse { 0%{opacity:.55;transform:scale(1)} 100%{opacity:.9;transform:scale(1.12)} }

/* Content */
.home-body {
position: relative; z-index: 2;
flex: 1; display: flex; flex-direction: column;
padding: 62px 32px 48px;
}

.weather-block { display: flex; align-items: center; gap: 11px; margin-bottom: 14px; }

.weather-icon-wrap {
width: 44px; height: 44px; border-radius: 50%;
background: rgba(140,120,180,0.14);
backdrop-filter: blur(10px);
display: flex; align-items: center; justify-content: center;
font-size: 1.22rem;
box-shadow: 0 2px 14px rgba(140,120,180,0.14);
}

.weather-temp {
font-family: var(–f-d); font-size: 1.55rem; font-weight: 600;
color: #2a2535; letter-spacing: -.025em;
}

.home-greeting { margin-top: 4px; }

.greet-1 {
font-family: var(–f-d); font-size: 2.75rem; font-weight: 600;
line-height: 1.1; letter-spacing: -.038em; color: #1e1a2e;
}

.greet-2 {
font-family: var(–f-d); font-size: 2.75rem; font-weight: 300;
line-height: 1.1; letter-spacing: -.038em;
color: #6b5ea8; font-style: italic;
}

.home-spacer { flex: 1; }

.home-bottom { display: flex; align-items: flex-end; gap: 15px; }

/* Home orb */
.home-orb {
width: 44px; height: 44px; border-radius: 50%;
position: relative; flex-shrink: 0;
cursor: pointer;
/* This is what the morph-overlay starts from */
}

.home-orb::before {
content: ‘’; position: absolute; inset: 0; border-radius: 50%; padding: 2px;
background: conic-gradient(from 0deg, #8b6fd4, #60a5fa, #c084fc, #f472b6, #8b6fd4);
-webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
-webkit-mask-composite: xor; mask-composite: exclude;
animation: orb-spin 4s linear infinite;
box-shadow: 0 0 12px rgba(139,111,212,.35);
}

.home-orb::after {
content: ‘’; position: absolute; inset: 4px; border-radius: 50%;
background: radial-gradient(circle at 34% 32%, rgba(200,180,255,.5), rgba(100,80,180,.1));
}

@keyframes orb-spin { to { transform: rotate(360deg); } }

.tap-hint {
font-family: var(–f-b); font-size: .72rem; font-weight: 300;
letter-spacing: .05em; color: #6b6880; padding-bottom: 4px;
}

/* ═══════════════════════════════════════════
CHAT SCREEN
═══════════════════════════════════════════ */
#chat {
background: #08070f;
opacity: 0;
pointer-events: none;
transition: opacity .35s var(–ease);
}

#chat.visible {
opacity: 1;
pointer-events: all;
}

/* Ambient bg */
.chat-ambient {
position: absolute; inset: 0; overflow: hidden; pointer-events: none;
}

.chat-ambient::before {
content: ‘’; position: absolute; inset: -40%;
background:
radial-gradient(ellipse 55% 40% at 10% 10%, rgba(139,111,212,.17) 0%, transparent 60%),
radial-gradient(ellipse 45% 50% at 90% 22%, rgba(96,165,250,.11)  0%, transparent 60%),
radial-gradient(ellipse 62% 35% at 50% 90%, rgba(139,111,212,.09) 0%, transparent 55%);
animation: ambient-drift 18s ease-in-out infinite alternate;
}

@keyframes ambient-drift {
0%   { transform: translate(0,0);    filter: hue-rotate(0deg); }
100% { transform: translate(1%,.8%); filter: hue-rotate(22deg); }
}

.chat-ambient::after {
content: ‘’; position: absolute; inset: 0; opacity: .022;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘n’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=’.85’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23n)’/%3E%3C/svg%3E”);
background-size: 128px; pointer-events: none;
}

/* Header */
.chat-header {
position: relative; z-index: 10; flex-shrink: 0;
display: flex; align-items: center; justify-content: space-between;
padding: 22px 26px 16px;
border-bottom: 1px solid var(–c-bdr);
background: rgba(8,7,15,.75);
backdrop-filter: blur(22px);
/* entrance */
transform: translateY(-100%);
opacity: 0;
transition: transform .45s var(–ease) .1s, opacity .45s var(–ease) .1s;
}

#chat.visible .chat-header {
transform: translateY(0);
opacity: 1;
}

.header-brand {
font-family: var(–f-d); font-size: .95rem; font-weight: 700;
letter-spacing: .3em; text-transform: uppercase;
color: rgba(238,237,245,.9);
}

.header-right { display: flex; align-items: center; gap: 12px; }

.header-status {
display: flex; align-items: center; gap: 7px;
font-size: .62rem; font-weight: 300; letter-spacing: .1em;
color: var(–c-dim);
}

.s-dot {
width: 6px; height: 6px; border-radius: 50%;
background: #5eab7a; box-shadow: 0 0 6px rgba(94,171,122,.6);
animation: sdot 3s ease-in-out infinite;
transition: background .3s, box-shadow .3s;
}
.s-dot.offline  { background:#444; box-shadow:none; animation:none; }
.s-dot.thinking { background:var(–c-gold); box-shadow:0 0 8px rgba(251,191,36,.7); animation:tdot2 .7s ease-in-out infinite; }

@keyframes sdot  { 0%,100%{opacity:1} 50%{opacity:.4} }
@keyframes tdot2 { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.5)} }

.back-btn {
width: 30px; height: 30px; border-radius: 50%;
background: rgba(255,255,255,.05); border: 1px solid var(–c-bdr);
color: var(–c-dim); cursor: pointer;
display: flex; align-items: center; justify-content: center;
transition: all .2s;
}
.back-btn:hover { background: rgba(255,255,255,.1); color: rgba(238,237,245,.8); }
.back-btn svg { width: 13px; height: 13px; }

/* ── Messages ── */
.messages {
flex: 1; overflow-y: auto;
padding: 28px 20px;
display: flex; flex-direction: column; gap: 20px;
position: relative; z-index: 1;
scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 2px; }
.messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 2px; }

/* Message animation — staggered cinematic entrance */
.msg {
display: flex; flex-direction: column;
max-width: 82%;
/* base state for animation */
opacity: 0;
transform: translateY(18px) scale(.97);
/* animation triggered by JS adding .msg-enter */
}

.msg.msg-enter {
animation: msg-rise .5s var(–spring) forwards;
}

/* Neron messages slide from left */
.msg.neron { align-self: flex-start; transform-origin: left bottom; }
.msg.neron.msg-enter { animation: msg-from-left .48s var(–spring) forwards; }

/* User messages slide from right */
.msg.user  { align-self: flex-end; align-items: flex-end; transform-origin: right bottom; }
.msg.user.msg-enter  { animation: msg-from-right .44s var(–spring) forwards; }

/* Error */
.msg.error { align-self: flex-start; }
.msg.error.msg-enter { animation: msg-from-left .48s var(–spring) forwards; }

@keyframes msg-from-left {
0%   { opacity:0; transform: translateX(-16px) translateY(8px) scale(.96); }
60%  { opacity:1; }
100% { opacity:1; transform: translateX(0)     translateY(0)   scale(1);   }
}

@keyframes msg-from-right {
0%   { opacity:0; transform: translateX(16px) translateY(8px) scale(.96); }
60%  { opacity:1; }
100% { opacity:1; transform: translateX(0)    translateY(0)   scale(1);   }
}

@keyframes msg-rise {
0%   { opacity:0; transform: translateY(18px) scale(.97); }
100% { opacity:1; transform: translateY(0)    scale(1);   }
}

.msg-who {
font-size: .58rem; font-weight: 400; letter-spacing: .14em;
text-transform: lowercase; margin-bottom: 5px; padding: 0 3px;
color: var(–c-dim);
}
.msg.user .msg-who { color: rgba(167,139,250,.5); }

.msg-bubble {
font-family: var(–f-b); font-size: .82rem; font-weight: 300;
line-height: 1.74; padding: 13px 17px; border-radius: 20px;
white-space: pre-wrap; word-break: break-word;
}

.msg.neron .msg-bubble {
background: rgba(255,255,255,.05);
border: 1px solid var(–c-bdr);
border-top-left-radius: 4px;
color: rgba(238,237,245,.82);
/* subtle inner glow */
box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
}

.msg.user .msg-bubble {
background: rgba(139,111,212,.15);
border: 1px solid rgba(139,111,212,.22);
border-top-right-radius: 4px;
color: rgba(225,215,255,.9);
box-shadow: inset 0 1px 0 rgba(167,139,250,.08);
}

.msg.error .msg-bubble {
background: rgba(255,80,80,.06);
border-color: rgba(255,80,80,.15);
color: #ff9999;
}

/* Typing dots */
.typing-wrap { align-self: flex-start; display: flex; flex-direction: column; gap: 5px; opacity:0; }
.typing-wrap.msg-enter { animation: msg-from-left .4s var(–spring) forwards; }

.typing-dots {
display: flex; gap: 5px; align-items: center;
padding: 13px 18px;
background: rgba(255,255,255,.05); border: 1px solid var(–c-bdr);
border-top-left-radius: 4px; border-radius: 20px;
width: fit-content;
}
.typing-dots span { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,.25); animation: tdot 1.3s ease-in-out infinite; }
.typing-dots span:nth-child(2) { animation-delay: .16s; }
.typing-dots span:nth-child(3) { animation-delay: .32s; }
@keyframes tdot { 0%,60%,100%{transform:translateY(0);background:rgba(255,255,255,.25)} 30%{transform:translateY(-6px);background:var(–c-pl)} }

/* ── Input zone ── */
.input-zone {
position: relative; z-index: 10; flex-shrink: 0;
padding: 10px 22px 34px;
border-top: 1px solid var(–c-bdr);
background: rgba(8,7,15,.88);
backdrop-filter: blur(26px);
/* entrance */
transform: translateY(100%);
opacity: 0;
transition: transform .45s var(–ease) .18s, opacity .45s var(–ease) .18s;
}

#chat.visible .input-zone {
transform: translateY(0);
opacity: 1;
}

/* Text row */
.text-row {
display: flex; align-items: flex-end; gap: 10px;
opacity: 0; pointer-events: none;
transform: translateY(8px);
max-height: 0; overflow: hidden; margin-bottom: 0;
transition:
opacity .3s var(–ease),
transform .3s var(–ease),
max-height .35s var(–ease),
margin-bottom .3s;
}

.text-row.open {
opacity: 1; pointer-events: all;
transform: translateY(0);
max-height: 130px; overflow: visible;
margin-bottom: 12px;
}

.text-field {
flex: 1;
background: rgba(255,255,255,.05);
border: 1px solid rgba(255,255,255,.1);
border-radius: 16px;
transition: border-color .2s, box-shadow .2s;
}
.text-field:focus-within {
border-color: rgba(139,111,212,.38);
box-shadow: 0 0 0 3px rgba(139,111,212,.07);
}

textarea {
width: 100%; background: transparent; border: none; outline: none; resize: none;
font-family: var(–f-b); font-size: .82rem; font-weight: 300;
color: rgba(238,237,245,.9); padding: 11px 14px;
max-height: 90px; overflow-y: auto; line-height: 1.55;
}
textarea::placeholder { color: rgba(255,255,255,.2); }
textarea::-webkit-scrollbar { width: 2px; }
textarea::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); }

.send-btn {
width: 40px; height: 40px; border-radius: 50%;
background: linear-gradient(135deg, var(–c-p), var(–c-bl));
border: none; color: #fff; cursor: pointer;
display: flex; align-items: center; justify-content: center;
flex-shrink: 0;
box-shadow: 0 4px 18px rgba(139,111,212,.4);
transition: transform .15s, box-shadow .2s, opacity .2s;
}
.send-btn svg { width: 15px; height: 15px; }
.send-btn:hover  { transform: scale(1.09); box-shadow: 0 6px 28px rgba(139,111,212,.55); }
.send-btn:active { transform: scale(.93); }
.send-btn:disabled { opacity: .28; cursor: default; transform: none; box-shadow: none; }

/* ── Action bar ── */
.action-bar {
display: flex; align-items: center; justify-content: center;
position: relative; height: 78px;
}

/* ── THE ORB ── */
.orb-wrap {
position: relative;
display: flex; align-items: center; justify-content: center;
width: 78px; height: 78px;
cursor: pointer;
-webkit-tap-highlight-color: transparent;
user-select: none; flex-shrink: 0;
}

.o-ring { position: absolute; border-radius: 50%; border: 1px solid rgba(139,111,212,.28); opacity: 0; pointer-events: none; }
.o-ring-1 { width:  78px; height:  78px; }
.o-ring-2 { width: 102px; height: 102px; border-color: rgba(139,111,212,.16); }
.o-ring-3 { width: 126px; height: 126px; border-color: rgba(139,111,212,.08); }

.orb-wrap.idle .o-ring   { animation: ring-idle 3.4s ease-in-out infinite; }
.orb-wrap.idle .o-ring-2 { animation-delay: .55s; }
.orb-wrap.idle .o-ring-3 { animation-delay: 1.1s; }
@keyframes ring-idle { 0%,100%{opacity:0;transform:scale(.86)} 50%{opacity:.42;transform:scale(1)} }

.orb-wrap.recording .o-ring   { animation: ring-rec 1.05s ease-out infinite; border-color: rgba(244,114,182,.42); }
.orb-wrap.recording .o-ring-2 { animation-delay: .27s; border-color: rgba(244,114,182,.24); }
.orb-wrap.recording .o-ring-3 { animation-delay: .54s; border-color: rgba(244,114,182,.12); }
@keyframes ring-rec { 0%{opacity:.75;transform:scale(.8)} 100%{opacity:0;transform:scale(1.62)} }

.orb-wrap.thinking .o-ring   { animation: ring-think .85s ease-in-out infinite; border-color: rgba(251,191,36,.3); }
.orb-wrap.thinking .o-ring-2 { animation-delay: .22s; border-color: rgba(251,191,36,.18); }
.orb-wrap.thinking .o-ring-3 { animation-delay: .44s; border-color: rgba(251,191,36,.09); }
@keyframes ring-think { 0%,100%{opacity:0;transform:scale(.93)} 50%{opacity:.55;transform:scale(1.05)} }

.orb-core {
width: 62px; height: 62px; border-radius: 50%;
position: relative; z-index: 1;
transition: transform .2s var(–spring);
}

.orb-core::before {
content: ‘’; position: absolute; inset: 0; border-radius: 50%; padding: 2.5px;
background: conic-gradient(from 0deg, #8b6fd4 0%, #60a5fa 28%, #c084fc 52%, #818cf8 72%, #8b6fd4 100%);
-webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
-webkit-mask-composite: xor; mask-composite: exclude;
animation: orb-spin 3.5s linear infinite;
box-shadow: 0 0 20px rgba(167,139,250,.22);
}

.orb-core::after {
content: ‘’; position: absolute; inset: 5px; border-radius: 50%;
background: radial-gradient(circle at 36% 32%, rgba(167,139,250,.18), rgba(8,7,15,.94) 68%);
}

.orb-wrap.recording .orb-core::before {
background: conic-gradient(from 0deg, #f472b6 0%, #fb7185 40%, #e879a0 70%, #f472b6 100%);
animation: orb-spin .85s linear infinite;
}
.orb-wrap.thinking .orb-core::before {
background: conic-gradient(from 0deg, #fbbf24 0%, #a78bfa 38%, #60a5fa 68%, #fbbf24 100%);
animation: orb-spin 1.7s linear infinite;
}

.orb-wrap:active .orb-core { transform: scale(.88); }

.orb-mic {
position: absolute; inset: 0; z-index: 2;
display: flex; align-items: center; justify-content: center;
pointer-events: none;
}
.orb-mic svg { width: 19px; height: 19px; color: rgba(167,139,250,.72); transition: color .25s, transform .25s; }
.orb-wrap.recording .orb-mic svg { color: rgba(255,255,255,.95); transform: scale(1.12); }
.orb-wrap.thinking  .orb-mic svg { color: var(–c-gold); }

.orb-label {
position: absolute; bottom: -18px;
font-size: .57rem; font-weight: 300; letter-spacing: .1em;
color: var(–c-dim); white-space: nowrap; pointer-events: none;
}

/* Keyboard btn */
.kbd-btn {
position: absolute; right: 0;
width: 46px; height: 46px; border-radius: 15px;
background: rgba(255,255,255,.05); border: 1px solid var(–c-bdr);
color: var(–c-dim); cursor: pointer;
display: flex; align-items: center; justify-content: center;
transition: all .2s;
}
.kbd-btn svg { width: 20px; height: 20px; }
.kbd-btn:hover { background: rgba(255,255,255,.09); color: rgba(238,237,245,.65); }
.kbd-btn.on {
background: rgba(139,111,212,.12); border-color: rgba(139,111,212,.3);
color: var(–c-pl); box-shadow: 0 0 14px rgba(139,111,212,.1);
}

/* ── Connection toast ── */
#toast {
position: absolute;
bottom: 120px; left: 50%; transform: translateX(-50%) translateY(10px);
background: rgba(255,80,80,.12); border: 1px solid rgba(255,80,80,.22);
backdrop-filter: blur(12px);
color: #ffaaaa; font-size: .72rem; font-weight: 300; letter-spacing: .06em;
padding: 9px 18px; border-radius: 20px;
opacity: 0; pointer-events: none; white-space: nowrap; z-index: 20;
transition: opacity .3s, transform .3s;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

</style>
</head>

<script>
/* ══════════════════════════════════════════
   CONFIG — backend on localhost:8000
══════════════════════════════════════════ */
const API = 'http://localhost:8000';

/* ══════════════════════════════════════════
   DOM
══════════════════════════════════════════ */
const homeEl   = document.getElementById('home');
const chatEl   = document.getElementById('chat');
const msgsEl   = document.getElementById('msgs');
const txtEl    = document.getElementById('txt');
const sendBtn  = document.getElementById('send-btn');
const sDot     = document.getElementById('s-dot');
const sLbl     = document.getElementById('s-lbl');
const orb      = document.getElementById('orb');
const orbLbl   = document.getElementById('orb-lbl');
const kbdBtn   = document.getElementById('kbd-btn');
const textRow  = document.getElementById('text-row');
const backBtn  = document.getElementById('back-btn');
const morphEl  = document.getElementById('morph-overlay');
const loaderEl = document.getElementById('loader');
const toastEl  = document.getElementById('toast');

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let waiting=false, recording=false, kbdOpen=false;
let mediaRec=null, chunks=[];
let toastTimer=null;

/* ══════════════════════════════════════════
   CLOCK + GREETING
══════════════════════════════════════════ */
(function initGreeting() {
  const h   = new Date().getHours();
  const g1  = h<5 ? 'Bonne nuit,' : h<12 ? 'Bonjour,' : h<18 ? 'Bon après-midi,' : 'Bonsoir,';
  document.getElementById('greet-1').textContent = g1;
  document.getElementById('greet-2').textContent = 'Néron';
})();

/* ══════════════════════════════════════════
   ORB MORPH TRANSITION   home → chat
══════════════════════════════════════════ */
function goToChat() {
  /* 1. Fade home content */
  homeEl.classList.add('fading');

  /* 2. Trigger morph circle expanding */
  morphEl.style.transform = 'scale(0)';
  morphEl.classList.remove('collapsing');
  morphEl.classList.add('expanding');

  /* 3. After morph covers screen, show loader briefly */
  setTimeout(() => {
    loaderEl.classList.add('visible');
  }, 400);

  /* 4. Start health check */
  health().then(online => {
    /* 5. After total ~900ms: reveal chat */
    setTimeout(() => {
      loaderEl.classList.remove('visible');
      morphEl.classList.remove('expanding');
      morphEl.classList.add('collapsing');
      chatEl.classList.add('visible');

      /* Add welcome message with stagger */
      setTimeout(() => addMsg('neron', 'Bonsoir. Comment puis-je vous aider ?'), 120);
    }, 600);
  });
}

function goToHome() {
  chatEl.classList.remove('visible');
  morphEl.classList.remove('collapsing', 'expanding');
  morphEl.style.transform = 'scale(0)';
  homeEl.classList.remove('fading');
  msgsEl.innerHTML = '';
  if (kbdOpen) toggleKbd();
  setStatus('');
}

/* ══════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════ */
homeEl.addEventListener('click', goToChat);
backBtn.addEventListener('click', e => { e.stopPropagation(); goToHome(); });

/* ══════════════════════════════════════════
   STATUS
══════════════════════════════════════════ */
function setStatus(s) {
  sDot.className = 's-dot ' + s;
  sLbl.textContent = {
    '':        'en ligne',
    offline:   'hors ligne',
    thinking:  'en train de réfléchir…',
    connecting:'connexion…'
  }[s] ?? s;
}

/* ══════════════════════════════════════════
   ORB STATE
══════════════════════════════════════════ */
function setOrb(s) {
  orb.className = 'orb-wrap ' + s;
  orbLbl.textContent = {
    idle:      'maintenir pour parler',
    recording: 'relâcher pour envoyer',
    thinking:  'néron réfléchit…'
  }[s] ?? '';
}

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
function showToast(msg, duration = 3500) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), duration);
}

/* ══════════════════════════════════════════
   KEYBOARD TOGGLE
══════════════════════════════════════════ */
kbdBtn.addEventListener('click', toggleKbd);

function toggleKbd() {
  kbdOpen = !kbdOpen;
  kbdBtn.classList.toggle('on', kbdOpen);
  textRow.classList.toggle('open', kbdOpen);
  if (kbdOpen) setTimeout(() => txtEl.focus(), 300);
  else txtEl.blur();
}

/* ══════════════════════════════════════════
   TEXTAREA
══════════════════════════════════════════ */
txtEl.addEventListener('input', () => {
  txtEl.style.height = 'auto';
  txtEl.style.height = Math.min(txtEl.scrollHeight, 90) + 'px';
  sendBtn.disabled = !txtEl.value.trim();
});
txtEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener('click', send);

/* ══════════════════════════════════════════
   MESSAGES HELPERS
══════════════════════════════════════════ */
const scrollEnd = () =>
  msgsEl.scrollTo({ top: msgsEl.scrollHeight, behavior: 'smooth' });

function addMsg(role, text) {
  const w = document.createElement('div');
  w.className = 'msg ' + role;

  const s = document.createElement('span');
  s.className = 'msg-who';
  s.textContent = role === 'user' ? 'vous' : 'néron';

  const b = document.createElement('div');
  b.className = 'msg-bubble';
  b.textContent = text;

  w.append(s, b);
  msgsEl.appendChild(w);
  scrollEnd();

  /* Trigger entrance animation on next frame */
  requestAnimationFrame(() => {
    requestAnimationFrame(() => w.classList.add('msg-enter'));
  });

  return w;
}

function showTyping() {
  const w = document.createElement('div');
  w.className = 'typing-wrap';
  w.id = 'typing';

  const s = document.createElement('span');
  s.className = 'msg-who'; s.textContent = 'néron';

  const d = document.createElement('div');
  d.className = 'typing-dots';
  d.innerHTML = '<span></span><span></span><span></span>';

  w.append(s, d);
  msgsEl.appendChild(w);
  scrollEnd();

  requestAnimationFrame(() => {
    requestAnimationFrame(() => w.classList.add('msg-enter'));
  });
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

/* ══════════════════════════════════════════
   SEND TEXT → POST /input/text
══════════════════════════════════════════ */
async function send() {
  const text = txtEl.value.trim();
  if (!text || waiting) return;

  txtEl.value = ''; txtEl.style.height = 'auto';
  sendBtn.disabled = true; waiting = true;

  addMsg('user', text);
  showTyping();
  setStatus('thinking');
  setOrb('thinking');

  try {
    const r = await fetch(`${API}/input/text`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
      signal: AbortSignal.timeout(15000)
    });

    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();

    hideTyping();
    addMsg('neron', d.response || '…');
    setStatus('');
    setOrb('idle');

  } catch(err) {
    hideTyping();
    addMsg('error', `Connexion impossible — ${err.message}`);
    setStatus('offline');
    setOrb('idle');
    showToast('Backend hors ligne · http://localhost:8000');
  } finally {
    waiting = false;
    sendBtn.disabled = !txtEl.value.trim();
    if (kbdOpen) txtEl.focus();
  }
}

/* ══════════════════════════════════════════
   VOICE — hold orb → POST /input/audio
══════════════════════════════════════════ */
orb.addEventListener('mousedown',  startRec);
orb.addEventListener('touchstart', e => { e.preventDefault(); startRec(); }, { passive: false });
orb.addEventListener('mouseup',    stopRec);
orb.addEventListener('mouseleave', stopRec);
orb.addEventListener('touchend',   stopRec);
orb.addEventListener('touchcancel',stopRec);

async function startRec() {
  if (waiting || recording) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    chunks = [];
    mediaRec = new MediaRecorder(stream);
    mediaRec.ondataavailable = e => chunks.push(e.data);
    mediaRec.onstop = sendAudio;
    mediaRec.start();
    recording = true;
    setOrb('recording');
    setStatus('thinking');
  } catch(err) {
    setStatus('offline');
    showToast('Microphone inaccessible');
  }
}

function stopRec() {
  if (!recording || !mediaRec) return;
  mediaRec.stop();
  mediaRec.stream.getTracks().forEach(t => t.stop());
  recording = false;
  setOrb('thinking');
}

async function sendAudio() {
  if (!chunks.length) { setOrb('idle'); return; }
  waiting = true;

  const blob = new Blob(chunks, { type: 'audio/webm' });
  const form = new FormData();
  form.append('file', blob, 'voice.webm');
  showTyping();

  try {
    const r = await fetch(`${API}/input/audio`, {
      method: 'POST',
      body: form,
      signal: AbortSignal.timeout(20000)
    });
    if (!r.ok) throw new Error(`STT ${r.status}`);
    const d = await r.json();
    const tx = d.transcription || d.text || '';
    if (tx) addMsg('user', `🎙 ${tx}`);
    hideTyping();
    addMsg('neron', d.response || '…');
    setStatus('');
    setOrb('idle');
  } catch(err) {
    hideTyping();
    addMsg('error', `Erreur audio — ${err.message}`);
    setStatus('offline');
    setOrb('idle');
    showToast('Backend hors ligne · http://localhost:8000');
  } finally {
    waiting = false;
  }
}

/* ══════════════════════════════════════════
   HEALTH CHECK → GET /health
══════════════════════════════════════════ */
async function health() {
  setStatus('connecting');
  try {
    const r = await fetch(`${API}/health`, {
      signal: AbortSignal.timeout(4000)
    });
    if (r.ok) {
      setStatus('');
      return true;
    } else {
      setStatus('offline');
      showToast('Backend hors ligne · http://localhost:8000');
      return false;
    }
  } catch {
    setStatus('offline');
    showToast('Backend hors ligne · http://localhost:8000');
    return false;
  }
}
</script>
